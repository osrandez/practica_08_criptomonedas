#Name of the action
name: cryptocurrency_update

env:
  AUTOMATION_USERNAME: "osrandez"
  AUTOMATION_EMAIL: "uru.oscar.27@gmail.com"

# Controls when the action will run.
on:
  # Trigger the workflow on push
  push:
  repository_dispatch:
   types: invocacion_desde_curl

jobs:
  autoscrape:
    # The type of runner that the job will run on
    runs-on: macos-latest
    # Load repo and install R
    steps:
    - uses: actions/checkout@master
    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.x.x'
    # Set-up R
    - name: Install packages
      run: |
        R -e 'install.packages("dplyr")'
        R -e 'install.packages("chromote")'
        R -e 'install.packages("rvest")'
    # Run R script
    - name: scrap
      run: Rscript criptocurrency_values.R
    # Add new files in data folder, commit along with other modified files, push
    - name: Commit files
      run: |
        git config --local user.name "$AUTOMATION_USERNAME"
        git config --local user.email "$AUTOMATION_EMAIL"
        git add data/*
        git commit -am "gh actions: Update cripto values$(date)"
        git push origin main
      env:
        REPO_KEY: ${{secrets.GITHUB_TOKEN}}
